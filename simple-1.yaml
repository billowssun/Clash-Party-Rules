# 基础锚点设置
p: &p {type: http, interval: 86400, health-check: {enable: true, url: http://1.1.1.1/generate_204, interval: 1800, timeout: 5000}}

proxy-providers:
  Subscribe:
    url: "https://psub.pddshop.cc/sub?target=clash&url=vless%3A%2F%2F595efe50-2bca-4796-b781-9bb42971871f%40node.pddshop.cc%3A51547%3Fencryption%3Dnone%26flow%3Dxtls-rprx-vision%26security%3Dreality%26sni%3Dlovelive-anime.jp%26fp%3Dchrome%26pbk%3Dj43t9cCXh_O_2kE2ps8OfBwXwztbxjf_9z2mhsIbKQo%26sid%3D4c%26spx%3D%252F%26type%3Dtcp%26headerType%3Dnone%23LavPh7XG%7Cvless%3A%2F%2F232563b2-0650-4be0-94ea-3d2203ce5408%4072.18.82.21%3A15898%3Fencryption%3Dmlkem768x25519plus.native.0rtt.58b_7m3RbUjSIJrhOIE1J07TyXOfu0q8GakIKYPaoko%26security%3Dnone%26type%3Dws%26path%3D%252F%23ghg0nbku&insert=false&config=https%3A%2F%2Fcdn.jsdelivr.net%2Fgh%2FSleepyHeeead%2Fsubconverter-config%40master%2Fremote-config%2Funiversal%2Fno-urltest.ini&emoji=true&list=false&tfo=false&scv=true&fdn=false&sort=false&udp=true&new_name=true"
    <<: *p

mixed-port: 7893
tcp-concurrent: true
allow-lan: true
ipv6: false
log-level: info
unified-delay: true
global-client-fingerprint: chrome
find-process-mode: strict

# 使用镜像加速 Geo 数据下载
geodata-mode: true
geox-url:
  geoip: "https://mirror.ghproxy.com/https://raw.githubusercontent.com/Loyalsoldier/geoip/release/geoip.dat"
  geosite: "https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://mirror.ghproxy.com/https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb"
  asn: "https://mirror.ghproxy.com/https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb"

profile: { store-selected: true, store-fake-ip: false }
sniffer: { enable: true, sniff: { HTTP: { ports: [80], override-destination: true }, TLS: { ports: [443, 8443] }, QUIC: { ports: [443, 8443] } } }

tun:
  enable: true
  stack: mixed
  dns-hijack: [any:53]
        
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  listen: :1053
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter: ['*', '+.lan', '+.local', '+.direct', '+.msftconnecttest.com', '+.msftncsi.com']
  nameserver: [223.5.5.5, 119.29.29.29]

# 策略组模板锚点
c: &c {type: http, behavior: classical, format: text, interval: 86400}
url-test: &url-test {type: url-test, url: http://1.1.1.1/generate_204, interval: 300, tolerance: 50}
select: &select {type: select}

proxy-groups:
  # 修复：增加了 use: [Subscribe] 确保能获取到节点
  - {name: 手动切换, <<: *select, use: [Subscribe], proxies: [DIRECT], icon: https://github.com/shindgewongxj/WHATSINStash/raw/main/icon/applesafari.png}
  
  # 优化：自动测速选择延迟最低的美国节点
  - {name: 美国节点, <<: *url-test, use: [Subscribe], filter: "(?i)美|us|united states|america", proxies: [DIRECT], icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png}
  
  - {name: 兜底分组, <<: *select, use: [Subscribe], proxies: [DIRECT], icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png}

